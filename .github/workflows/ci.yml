name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# This workflow uses no `github.event.*` user-controlled inputs in run: blocks
# (no PR titles, commit messages, etc.), so it is not exposed to the
# script-injection class of bug described at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      # Fyne needs OpenGL + X11 headers to compile on Linux.
      - name: Install Fyne build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libglu1-mesa-dev \
            xorg-dev

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
