<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lexend:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #1a1a1a;
        --mid: #a8a7a7;
        --light: #8a8a8a;
        --rule: #c8b89a;
        --accent: #e91d63;
        --bg: #faf8f4;
        --card: #ffffff;
        --gray: #424242;
      }

      body {
        background: var(--bg);
        font-family: "EB Garamond", Georgia, serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 3rem 1.5rem;
        line-height: 1.6;
      }

      .page {
        max-width: 780px;
        margin: 0 auto;
        background: var(--card);
        box-shadow: 0 4px 40px rgba(0, 0, 0, 0.1);
        padding: 4rem 3.5rem; /* Increased padding for letter feel */
      }
      .sincerely {
        margin: 0px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 3px solid var(--ink);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
      }

      .name-brand {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 2.5rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink);
        line-height: 1;
      }

      .contact-info {
        text-align: right;
        font-family: "Lexend", sans-serif;
        font-size: 0.75rem;
        color: var(--gray);
      }

      .contact-info p {
        margin-bottom: 2px;
      }
      .contact-info .accent-text {
        color: var(--accent);
        font-weight: 500;
      }

      .letter-meta {
        margin-bottom: 2.5rem;
        font-family: "Lexend", sans-serif;
        font-size: 0.9rem;
        color: var(--gray);
      }

      .date {
        margin-bottom: 1.5rem;
        font-weight: 600;
        color: var(--ink);
      }

      .recipient-block {
        line-height: 1.4;
      }

      .letter-content {
        font-family: "EB Garamond", serif;
        font-size: 0.9rem; /* Slightly larger for readability */
        color: var(--ink);
        text-align: justify;
      }

      .letter-content p {
        font-family: "Lexend";
      }

      .salutation {
        margin-bottom: 1.5rem;
        font-weight: 500;
      }

      .closing {
        margin-top: 3rem;
      }

      .signature-name {
        font-family: "Oswald", sans-serif;
        font-size: 1.2rem;
        text-transform: uppercase;
        color: var(--accent);
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }
        .page {
          box-shadow: none;
          padding: 1in;
        } /* Standard print margins */
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="name-brand">[FIRST NAME]<br />[LAST NAME]</div>
        <div class="contact-info">
          <p>[STREET ADDRESS]</p>
          <p>[CITY, STATE, ZIP]</p>
          <p class="accent-text">[PHONE NUMBER]</p>
          <p class="accent-text">[EMAIL ADDRESS]</p>
        </div>
      </header>

      <div class="letter-meta">
        <p class="date">{- Date -}</p>

        <div class="recipient-block">
          <p>{- Company_Name -}</p>
          <p>{- Location -}</p>
          <p>{- City_State_Zip -}</p>
        </div>
      </div>

      <main class="letter-content">
        <p class="salutation">Dear Hiring Manager,</p>

        <p>{- Intro -}</p>

        <p>{- Body1 -}</p>

        <p>{- Body2 -}</p>

        <p>{- Conclusion -}</p>

        <div class="closing">
          <p class="sincerely">Sincerely,</p>
          <p class="signature-name">[YOUR FULL NAME]</p>
        </div>
      </main>
    </div>
  </body>
</html>
