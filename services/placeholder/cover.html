<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --ink: #1a1a1a;
        --mid: #6b6b6b;
        --light: #8a8a8a;
        --rule: #c8b89a;
        --accent: #e91d63;
        --bg: #faf8f4;
        --card: #ffffff;
        --gray: #333;
      }

      @page { margin: 0; }
      @media print {
        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }

      body {
        background: var(--bg);
        font-family: "EB Garamond", Georgia, serif;
        color: var(--ink);
        padding: 2.5rem 1.5rem;
      }

      .page {
        max-width: 780px;
        margin: 0 auto;
        background: var(--card);
        box-shadow: 0 4px 40px rgba(0, 0, 0, 0.1);
        padding: 2rem 2rem;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: nowrap;
        gap: 1rem;
        border-bottom: 3px solid var(--ink);
        padding-bottom: 0.5rem;
        margin-bottom: 1.2rem;
      }

      .name-brand {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 1.45rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--ink);
        line-height: 1;
        white-space: nowrap;
        flex: 0 0 auto;
      }

      .contact-inline {
        font-family: "Roboto Condensed", "Lexend", sans-serif;
        font-size: 10.5px;
        color: var(--mid);
        text-align: right;
        line-height: 1.3;
        white-space: nowrap;
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .contact-inline a {
        color: var(--accent);
        text-decoration: none;
      }

      .letter-meta {
        font-family: "Lexend", sans-serif;
        font-size: 0.85rem;
        color: var(--gray);
        margin-bottom: 1.2rem;
      }

      .letter-meta .date { margin-bottom: 0.8rem; }

      .recipient-block p { line-height: 1.3; }

      .letter-content {
        font-family: "EB Garamond", Georgia, serif;
        font-size: 1rem;
        line-height: 1.45;
        color: var(--ink);
      }

      .letter-content .salutation { margin-bottom: 0.8rem; }

      .letter-content p { margin-bottom: 0.7rem; text-align: justify; }

      .closing { margin-top: 1.2rem; }

      .sincerely { margin-bottom: 0.2rem; }

      .signature-name {
        font-family: "Oswald", sans-serif;
        font-size: 1.05rem;
        text-transform: uppercase;
        color: var(--accent);
      }

      @media print {
        body { background: white; padding: 0; }
        .page { box-shadow: none; padding: 1in; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header-row">
        <div class="name-brand">{- FullName -}</div>
        <div class="contact-inline">{!- ContactLine -!}</div>
      </div>

      <div class="letter-meta">
        <p class="date">{- Date -}</p>
        <div class="recipient-block">
          <p>{- Company_Name -}</p>
          <p>{- Location -}</p>
        </div>
      </div>

      <main class="letter-content">
        <p class="salutation">Dear Hiring Manager,</p>
        <p>{- Intro -}</p>
        <p>{- Body1 -}</p>
        <p>{- Body2 -}</p>
        <p>{- Conclusion -}</p>
        <div class="closing">
          <p class="sincerely">Sincerely,</p>
          <p class="signature-name">{- FullName -}</p>
        </div>
      </main>
    </div>
  </body>
</html>
