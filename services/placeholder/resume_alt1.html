<!-- Design: Modern Minimal Sans — Inter-based, monochrome with a single subtle slate accent, generous whitespace, ATS-clean single column. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{- FullName -} — Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #0f1115;
        --body: #2a2d33;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #334155; /* slate-700, subdued */
        --bg: #f7f7f5;
        --card: #ffffff;
      }

      @page {
        size: Letter;
        margin: 0;
      }

      html, body {
        background: var(--bg);
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10.5pt;
        color: var(--body);
        line-height: 1.45;
        padding: 0.5in 0;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .page {
        width: 8.5in;
        min-height: 11in;
        margin: 0 auto;
        background: var(--card);
        padding: 0.65in 0.7in 0.6in 0.7in;
        box-shadow: 0 1px 30px rgba(15, 17, 21, 0.08);
      }

      /* HEADER */
      header.masthead {
        margin-bottom: 18pt;
        padding-bottom: 12pt;
        border-bottom: 1px solid var(--line);
      }

      .name {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 26pt;
        letter-spacing: -0.02em;
        color: var(--ink);
        line-height: 1;
        margin-bottom: 8pt;
      }

      .role-strip {
        font-weight: 400;
        font-size: 9.5pt;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      .contact-line {
        margin-top: 6pt;
        font-size: 9pt;
        color: var(--muted);
        line-height: 1.5;
      }

      .contact-line a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      .contact-line a:hover {
        text-decoration: underline;
      }

      /* SECTIONS */
      section {
        margin-bottom: 13pt;
      }

      .section-title {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 8.5pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink);
        margin-bottom: 7pt;
      }

      .summary {
        font-size: 10pt;
        line-height: 1.5;
        color: var(--body);
      }

      .tech-list {
        font-size: 9.5pt;
        line-height: 1.5;
        color: var(--body);
      }

      /* ENTRIES */
      .entry {
        margin-bottom: 9pt;
      }
      .entry:last-child {
        margin-bottom: 0;
      }

      .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12pt;
        margin-bottom: 2pt;
      }

      .entry-title {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 10.5pt;
        color: var(--ink);
        letter-spacing: -0.005em;
      }

      .entry-title span {
        font-weight: 400;
        color: var(--body);
      }

      .entry-title .repo-link {
        font-weight: 400;
        font-size: 9pt;
        color: var(--accent);
        text-decoration: none;
        margin-left: 4pt;
      }

      .entry-date {
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 9pt;
        color: var(--muted);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .entry-body {
        font-size: 9.75pt;
        line-height: 1.5;
        color: var(--body);
      }

      .entry-body ul {
        list-style: none;
        padding-left: 0;
        margin-top: 2pt;
      }

      .entry-body ul li {
        position: relative;
        padding-left: 11pt;
        margin-bottom: 2pt;
      }

      .entry-body ul li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.55em;
        width: 4pt;
        height: 1px;
        background: var(--accent);
      }

      .entry-body p {
        margin-top: 2pt;
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }
        .page {
          box-shadow: none;
          padding: 0.5in 0.6in;
          width: 100%;
          min-height: auto;
        }
        * {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <div class="name">{- FullName -}</div>
        <div class="role-strip">{- Summary -}</div>
        <div class="contact-line">{!- ContactLine -!}</div>
      </header>

      <section>
        <div class="section-title">Experience</div>
        {!- ExperienceSection -!}
      </section>

      <section>
        <div class="section-title">Projects</div>
        {!- ProjectsSection -!}
      </section>

      <section>
        <div class="section-title">Education</div>
        {!- EducationSection -!}
      </section>

      <section>
        <div class="section-title">Technologies</div>
        <div class="tech-list">{- TechList -}</div>
      </section>

      <!-- Hidden metadata for parity with cover letter date -->
      <div style="display:none">{- Date -} {- Email -} {- Phone -} {- Location -} {- LinkedIn -} {- GitHub -}</div>
    </div>
  </body>
</html>
