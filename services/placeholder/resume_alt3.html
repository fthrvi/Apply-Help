<!-- Design: Architectural Technical — JetBrains Mono headings + Inter body, grid-based, sharp cyan accent, terminal-inspired section markers. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{- FullName -} — Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #0b0f14;
        --body: #1f2933;
        --muted: #62737d;
        --rule: #d6dde2;
        --grid: #eef2f4;
        --accent: #0a7e8c; /* sharp teal/cyan */
        --bg: #f4f6f7;
        --card: #ffffff;
      }

      @page {
        size: Letter;
        margin: 0;
      }

      html, body {
        background: var(--bg);
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 10pt;
        color: var(--body);
        line-height: 1.45;
        padding: 0.5in 0;
        -webkit-font-smoothing: antialiased;
      }

      .page {
        width: 8.5in;
        min-height: 11in;
        margin: 0 auto;
        background: var(--card);
        padding: 0.55in 0.65in 0.55in 0.65in;
        box-shadow: 0 1px 30px rgba(11, 15, 20, 0.08);
        position: relative;
      }

      /* HEADER - grid layout, mono name */
      header.masthead {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14pt;
        align-items: end;
        margin-bottom: 14pt;
        padding-bottom: 10pt;
        border-bottom: 2px solid var(--ink);
      }

      .name-block {
        display: flex;
        flex-direction: column;
        gap: 4pt;
      }

      .name-mark {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 8pt;
        letter-spacing: 0.1em;
        color: var(--accent);
        text-transform: uppercase;
      }

      .name {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 22pt;
        letter-spacing: -0.01em;
        color: var(--ink);
        line-height: 1;
      }

      .contact-line {
        font-family: "JetBrains Mono", monospace;
        font-size: 8.5pt;
        color: var(--muted);
        line-height: 1.5;
        text-align: right;
        max-width: 3in;
      }

      .contact-line a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      .contact-line a:hover {
        text-decoration: underline;
      }

      /* SUMMARY block */
      .summary-block {
        margin-bottom: 12pt;
        padding: 8pt 10pt;
        background: var(--grid);
        border-left: 2px solid var(--accent);
      }

      .summary-block .summary {
        font-size: 9.75pt;
        line-height: 1.5;
        color: var(--body);
      }

      /* SECTIONS */
      section {
        margin-bottom: 12pt;
      }

      .section-title {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 9pt;
        letter-spacing: 0.04em;
        color: var(--ink);
        margin-bottom: 7pt;
        padding-bottom: 3pt;
        border-bottom: 1px solid var(--rule);
        display: flex;
        align-items: center;
        gap: 6pt;
      }

      .section-title::before {
        content: "//";
        color: var(--accent);
        font-weight: 700;
      }

      .tech-list {
        font-family: "JetBrains Mono", monospace;
        font-size: 8.75pt;
        line-height: 1.55;
        color: var(--body);
      }

      /* ENTRIES */
      .entry {
        margin-bottom: 9pt;
        padding-left: 10pt;
        border-left: 1px solid var(--rule);
      }
      .entry:last-child {
        margin-bottom: 0;
      }

      .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12pt;
        margin-bottom: 3pt;
      }

      .entry-title {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 10.25pt;
        color: var(--ink);
      }

      .entry-title span {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 9pt;
        color: var(--accent);
      }

      .entry-title .repo-link {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 8.5pt;
        color: var(--accent);
        text-decoration: none;
        margin-left: 4pt;
      }

      .entry-title .repo-link::before {
        content: "[ ";
        color: var(--muted);
      }

      .entry-title .repo-link::after {
        content: " ]";
        color: var(--muted);
      }

      .entry-date {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 8.5pt;
        color: var(--muted);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .entry-body {
        font-family: "Inter", sans-serif;
        font-size: 9.5pt;
        line-height: 1.5;
        color: var(--body);
      }

      .entry-body ul {
        list-style: none;
        padding-left: 0;
        margin-top: 2pt;
      }

      .entry-body ul li {
        position: relative;
        padding-left: 14pt;
        margin-bottom: 2pt;
      }

      .entry-body ul li::before {
        content: "›";
        position: absolute;
        left: 2pt;
        top: -1pt;
        color: var(--accent);
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 10pt;
      }

      .entry-body p {
        margin-top: 2pt;
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }
        .page {
          box-shadow: none;
          padding: 0.5in 0.6in;
          width: 100%;
          min-height: auto;
        }
        * {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <div class="name-block">
          <div class="name-mark">// resume</div>
          <div class="name">{- FullName -}</div>
        </div>
        <div class="contact-line">{!- ContactLine -!}</div>
      </header>

      <div class="summary-block">
        <p class="summary">{- Summary -}</p>
      </div>

      <section>
        <div class="section-title">experience</div>
        {!- ExperienceSection -!}
      </section>

      <section>
        <div class="section-title">projects</div>
        {!- ProjectsSection -!}
      </section>

      <section>
        <div class="section-title">education</div>
        {!- EducationSection -!}
      </section>

      <section>
        <div class="section-title">stack</div>
        <div class="tech-list">{- TechList -}</div>
      </section>

      <div style="display:none">{- Date -} {- Email -} {- Phone -} {- Location -} {- LinkedIn -} {- GitHub -}</div>
    </div>
  </body>
</html>
