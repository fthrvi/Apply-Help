<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #1a1a1a;
        --mid: #6b6b6b;
        --light: #8a8a8a;
        --rule: #c8b89a;
        --accent: #e91d63;
        --accentfade: #e89b8e;
        --bg: #faf8f4;
        --card: #ffffff;
        --gray: #424242;
      }

      @page { margin: 0; }

      @media print {
        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }

      body {
        background: var(--bg);
        font-family: "EB Garamond", Georgia, serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 1.5rem 1rem;
      }

      .page {
        max-width: 780px;
        margin: 0 auto;
        background: var(--card);
        box-shadow: 0 4px 40px rgba(0, 0, 0, 0.1);
        padding: 1.4rem 1.7rem;
      }

      /* ── HORIZONTAL HEADER ── */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: nowrap;
        gap: 1rem;
        border-bottom: 3px solid var(--ink);
        padding-bottom: 0.5rem;
        margin-bottom: 0.9rem;
      }

      .name {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 1.45rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--ink);
        line-height: 1;
        white-space: nowrap;
        flex: 0 0 auto;
      }

      .contact-inline {
        font-family: "Roboto Condensed", "Lexend", sans-serif;
        font-size: 10.5px;
        color: var(--mid);
        text-align: right;
        line-height: 1.3;
        white-space: nowrap;
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .contact-inline a {
        color: var(--accent);
        text-decoration: none;
      }

      .contact-inline a:hover { text-decoration: underline; }

      /* ── SECTIONS ── */
      section { margin-bottom: 0.55rem; }

      .summary {
        font-size: 0.8rem;
        line-height: 1.15rem;
        color: var(--gray);
        font-family: "Lexend", sans-serif;
        margin-bottom: 0.55rem;
      }

      .section-title {
        font-family: "Oswald", sans-serif;
        font-weight: 400;
        font-size: 0.9rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gray);
        border-bottom: 1px solid var(--rule);
        padding-bottom: 0.2rem;
        margin-bottom: 0.35rem;
      }

      /* ── ENTRIES ── */
      .entry { margin-bottom: 0.5rem; }
      .entry:last-child { margin-bottom: 0; }

      .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 0.1rem;
      }

      .entry-title {
        font-family: "Source Code Pro", monospace;
        font-weight: 600;
        font-size: 0.88rem;
        letter-spacing: 0.03em;
        color: var(--accent);
      }

      .entry-title span {
        font-family: monospace, sans-serif;
        font-weight: 400;
        color: var(--gray);
        font-size: 0.75rem;
      }

      .entry-title .repo-link {
        font-family: "Roboto Condensed", monospace;
        font-size: 0.68rem;
        font-weight: 400;
        color: var(--mid);
        text-decoration: none;
        letter-spacing: 0;
        margin-left: 0.25rem;
      }
      .entry-title .repo-link:hover { text-decoration: underline; }

      .entry-date {
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--light);
        white-space: nowrap;
        font-family: "Oswald", sans-serif;
      }

      .entry-body {
        font-size: 0.76rem;
        line-height: 0.95rem;
        color: var(--gray);
        font-family: "Lexend", sans-serif;
      }

      .entry-body ul {
        list-style: none;
        padding: 0;
      }
      .entry-body ul li {
        padding-left: 0.75rem;
        position: relative;
        margin-bottom: 0.15rem;
      }
      .entry-body ul li::before {
        content: "–";
        position: absolute;
        left: 0;
        color: var(--rule);
      }

      .entry-body p {
        margin: 0;
      }

      .tech-list {
        font-size: 0.76rem;
        line-height: 1.3;
        color: var(--gray);
        font-family: "Lexend", sans-serif;
      }

      @media print {
        body { background: white; padding: 0; }
        .page { box-shadow: none; padding: 2rem 2.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header-row">
        <div class="name">{- FullName -}</div>
        <div class="contact-inline">{!- ContactLine -!}</div>
      </div>

      <p class="summary">{- Summary -}</p>

      <section>
        <div class="section-title">Experience</div>
        {!- ExperienceSection -!}
      </section>

      <section>
        <div class="section-title">Projects</div>
        {!- ProjectsSection -!}
      </section>

      <section>
        <div class="section-title">Education</div>
        {!- EducationSection -!}
      </section>

      <section>
        <div class="section-title">Technologies</div>
        <p class="tech-list">{- TechList -}</p>
      </section>
    </div>
  </body>
</html>
